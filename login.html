<body>
    <div class="login-container">
        <img src="assets/images/logo-light.webp" alt="brand image" class="light-brand-img">
        <div class="auth-img-container">
            <img src="assets/images/auth-bg-img.jpg" alt="authentication image" class="auth-img">
        </div>

        <form class="auth-form">
            <div class="auth-header">
                <img src="assets/images/logo-dark.webp" alt="logo brand image" class="brand-img">
                <h1 class="auth-title">Log In</h1>
                <p class="auth-supporting-text">Welcome back! Please enter your details</p>
            </div>

            <div>
            <div class="form-group mg-bt">
                <label for="user-email" class="email-label">Email Address <span class="red-asterisk" aria-hidden="true">*</span></label>
                <input type="email" placeholder="Enter your email" id="user-email" name="user_email" class="email-input" required>
            </div>

            <div class="form-group little-mg-bt">
                <label for="user-password" class="password-label">Password <span class="red-asterisk" aria-hidden="true">*</span></label>
                <div class="input-dflex">
                <input type="password" placeholder="Password" id="user-password" name="user_password" class="password-input" required>
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="password-icon" style="cursor: pointer; width: 16px; height: 16px;"><g clip-path="url(#Eye0Cross_svg__a)"><path fill="#000" d="M23.267 9.408a15.9 15.9 0 0 0-3.37-3.908l2.799-2.799a1 1 0 0 0-1.414-1.413L18.24 4.335A12.05 12.05 0 0 0 12 2.646c-6.189 0-9.715 4.237-11.267 6.762a4.91 4.91 0 0 0 0 5.16 15.9 15.9 0 0 0 3.37 3.907l-2.799 2.8a1 1 0 1 0 1.413 1.413l3.051-3.051A12.05 12.05 0 0 0 12 21.329c6.189 0 9.715-4.236 11.267-6.761a4.91 4.91 0 0 0 0-5.16m-17.265 2.58a5.988 5.988 0 0 1 9.468-4.884l-1.452 1.452A3.95 3.95 0 0 0 12 7.989a4 4 0 0 0-3.998 3.999c.003.711.199 1.409.566 2.018l-1.451 1.451a5.96 5.96 0 0 1-1.115-3.47M12 17.985a5.96 5.96 0 0 1-3.47-1.114l1.452-1.452c.61.368 1.307.564 2.018.567a4 4 0 0 0 3.999-3.998 3.94 3.94 0 0 0-.567-2.019l1.451-1.451A5.988 5.988 0 0 1 12 17.985"></path></g><defs><clipPath id="Eye0Cross_svg__a"><path fill="#fff" d="M0 0h24v24H0z"></path></clipPath></defs></svg>
                </div>
            </div>

            <a href="#" class="forgot-password">Forgot your password?</a>
            </div>
        
            <button type="submit" class="login-btn">Log In</button>

            <p class="sign-up-text other-pixel">   
                Not a member yet?
                <a href="#" class="create-acct">Create an account</a>
            </p> 
        </form>

        <p class="sign-up-text">   
            Not a member yet?
            <a href="#" class="create-acct">Create an account</a>
        </p> 
    </div>
